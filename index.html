<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Basic page settings -->
	<meta charset="UTF-8" />
	<!-- Text shown in the browser tab -->
	<title>Student Media Hub</title>
	<script>
		if (localStorage.getItem("theme") === "dark") {
			document.documentElement.classList.add("dark");
		}
	</script>

	<!-- Compiled Tailwind CSS generated by `npm run build:css` -->
	<link rel="stylesheet" href="styles/output.css" />
</head>

<!--
	Body classes set the default look of the whole page:
	- bg-gray-50 gives a light background
	- text-gray-900 gives dark default text
-->
<body class="min-h-screen bg-gradient-to-b from-gray-50 to-gray-100 text-gray-900 transition-colors duration-200 dark:from-gray-950 dark:to-gray-900 dark:text-gray-100">

	<!-- NAVBAR: top area with title + login/logout button -->
	<header class="border-b border-gray-200/70 bg-white/80 backdrop-blur dark:border-gray-800 dark:bg-gray-950/80">
		<!-- Centers content and limits width (max-w-5xl) -->
		<div class="mx-auto flex max-w-5xl flex-col gap-3 p-4 sm:flex-row sm:items-center sm:justify-between">
			<div>
				<h1 class="text-lg font-semibold tracking-tight sm:text-xl md:text-2xl">Student Media Hub</h1>
				<p class="text-xs text-gray-500 dark:text-gray-400">Psych Honours 2026</p>
			</div>

			<!--
				authSection is a placeholder for authentication UI.
				JavaScript can replace this button with user info/logout later.
			-->
			<div id="authSection" class="flex w-full items-center justify-end gap-2 sm:w-auto">
				<button
					id="themeToggle"
					type="button"
					aria-label="Toggle dark mode"
					aria-pressed="false"
					class="rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 transition-all duration-200 ease-out hover:bg-gray-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-700 focus-visible:ring-offset-1 active:scale-[0.99] dark:border-gray-700 dark:bg-gray-900 dark:text-gray-200 dark:hover:bg-gray-800 dark:focus-visible:ring-gray-300 dark:focus-visible:ring-offset-gray-900"
				>
					Dark
				</button>
				<!-- loginBtn is easy to target in JS (e.g., addEventListener on click) -->
				<button id="loginBtn" type="button" aria-label="Log in with Google" class="rounded-xl bg-gray-900 px-4 py-2 text-sm font-medium text-white shadow-sm transition-all duration-200 ease-out hover:bg-black hover:shadow focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-700 focus-visible:ring-offset-1 active:scale-[0.99] dark:bg-white dark:text-gray-900 dark:hover:bg-gray-200 dark:focus-visible:ring-gray-300 dark:focus-visible:ring-offset-gray-900">
					Login
				</button>
			</div>
		</div>
	</header>

	<!-- MAIN: welcome page content -->
	<main class="mx-auto max-w-5xl p-4 sm:p-6 md:p-8">
		<section class="mb-6 rounded-3xl border border-gray-200 bg-white/90 p-5 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:mb-8 sm:p-7 dark:border-gray-800 dark:bg-gray-900/80">
			<h2 class="mb-2 text-2xl font-bold tracking-tight sm:text-3xl md:text-4xl">Welcome</h2>
			<p class="mb-2 max-w-2xl text-base leading-relaxed text-gray-700 sm:text-lg dark:text-gray-300">Browse dedicated student pages and view approved uploads.</p>
			<p class="max-w-2xl text-sm leading-relaxed text-gray-600 dark:text-gray-400">Use the search bar below to quickly find a student page.</p>
		</section>

		<section class="mb-5 rounded-2xl border border-gray-200 bg-white p-4 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:mb-6 sm:p-5 dark:border-gray-800 dark:bg-gray-900">
			<label for="studentSearch" class="mb-2 block text-sm font-medium tracking-wide text-gray-700 dark:text-gray-300">Search student pages</label>
			<div class="relative max-w-xl">
				<input
					id="studentSearch"
					type="text"
					placeholder="Type a student name..."
					autocomplete="off"
					class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 pr-10 text-[15px] leading-6 text-gray-900 shadow-sm transition-all duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-1 dark:border-gray-700 dark:bg-gray-950 dark:text-gray-100 dark:focus:ring-gray-200 dark:focus:ring-offset-gray-900"
				/>
				<span aria-hidden="true" class="absolute right-3 top-3 text-gray-500 dark:text-gray-400">⌕</span>
			</div>
		</section>

		<!-- Linkable student index (built by JavaScript) -->
		<section class="mb-6 rounded-2xl border border-gray-200 bg-white p-4 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:p-5 dark:border-gray-800 dark:bg-gray-900">
			<h2 class="mb-3 text-lg font-semibold tracking-tight">Student pages</h2>
			<div id="studentLinks" aria-live="polite"></div>
		</section>

	</main>

	<!--
		Load JavaScript as an ES module.
		type="module" allows modern JS features and import/export.
	-->
	<!-- Load local (ignored) runtime config before app.js -->
	<script src="config.local.js"></script>
	<script type="module" src="students.js"></script>
	<script type="module" src="app.js"></script>
</body>
</html>
