<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Basic page settings -->
	<meta charset="UTF-8" />
	<!-- Text shown in the browser tab -->
	<title>Student Media Hub</title>

	<!-- Compiled Tailwind CSS generated by `npm run build:css` -->
	<link rel="stylesheet" href="styles/output.css" />
</head>

<!--
	Body classes set the default look of the whole page:
	- bg-gray-50 gives a light background
	- text-gray-900 gives dark default text
-->
<body class="bg-gray-50 text-gray-900">

	<!-- NAVBAR: top area with title + login/logout button -->
	<header class="border-b bg-white">
		<!-- Centers content and limits width (max-w-5xl) -->
		<div class="max-w-5xl mx-auto flex justify-between items-center p-4">
			<h1 class="text-xl font-semibold">Student Media Hub</h1>

			<!--
				authSection is a placeholder for authentication UI.
				JavaScript can replace this button with user info/logout later.
			-->
			<div id="authSection">
				<!-- loginBtn is easy to target in JS (e.g., addEventListener on click) -->
				<button id="loginBtn" class="bg-black text-white px-4 py-2 rounded-xl">
					Login
				</button>
			</div>
		</div>
	</header>

	<!-- MAIN: welcome page content -->
	<main class="max-w-5xl mx-auto p-6">
		<section class="mb-8 rounded-2xl bg-white border p-6">
			<h2 class="text-3xl font-bold mb-2">Welcome</h2>
			<p class="text-lg text-gray-700 mb-2">Browse dedicated student pages and view approved uploads.</p>
			<p class="text-sm text-gray-600">Use the search bar below to quickly find a student page.</p>
		</section>

		<section class="mb-6">
			<label for="studentSearch" class="block text-sm font-medium mb-2">Search student pages</label>
			<div class="relative max-w-xl">
				<input
					id="studentSearch"
					type="text"
					placeholder="Type a student name..."
					class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-black"
				/>
				<span class="absolute right-3 top-3 text-gray-500">⌕</span>
			</div>
		</section>

		<!-- Linkable student index (built by JavaScript) -->
		<section class="mb-6">
			<h2 class="text-lg font-medium mb-2">Student pages</h2>
			<div id="studentLinks"></div>
		</section>

	</main>

	<!--
		Load JavaScript as an ES module.
		type="module" allows modern JS features and import/export.
	-->
	<!-- Load local (ignored) runtime config before app.js -->
	<script src="config.local.js"></script>
	<script type="module" src="students.js"></script>
	<script type="module" src="app.js"></script>
</body>
</html>
