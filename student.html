<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Showcase</title>
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="stylesheet" href="styles/output.css" />
</head>
<body class="min-h-screen bg-gradient-to-b from-brand-paper to-brand-mist text-brand-deep transition-colors duration-200 dark:from-brand-deep dark:to-brand-deep dark:text-brand-paper">
  <header class="border-b border-brand-sky/40 bg-brand-paper/85 backdrop-blur dark:border-brand-sky/40 dark:bg-brand-deep/95">
    <div class="mx-auto flex w-full max-w-7xl flex-col gap-3 p-4 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
      <a href="index.html" aria-label="Back to home" class="text-sm text-brand-deep/85 transition-colors duration-200 hover:text-brand-sky focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-sky focus-visible:ring-offset-1 dark:text-brand-mist/85 dark:hover:text-brand-paper dark:focus-visible:ring-brand-mist dark:focus-visible:ring-offset-brand-deep">← Home</a>
      <div class="flex w-full items-center justify-end gap-2 sm:w-auto">
        <button id="themeToggle" type="button" aria-label="Toggle dark mode" aria-pressed="false" class="rounded-xl border border-brand-sky/60 bg-brand-paper px-3 py-2 text-sm font-medium text-brand-deep transition-all duration-200 ease-out hover:bg-brand-mist focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-sky focus-visible:ring-offset-1 active:scale-[0.99] dark:border-brand-sky dark:bg-brand-deep dark:text-brand-paper dark:hover:bg-brand-sky/20 dark:focus-visible:ring-brand-mist dark:focus-visible:ring-offset-brand-deep">Dark</button>
        <button id="loginBtn" type="button" aria-label="Log in with Google" class="rounded-xl bg-brand-deep px-4 py-2 text-sm font-medium text-brand-paper shadow-sm transition-all duration-200 ease-out hover:bg-brand-sky hover:text-brand-deep hover:shadow focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-sky focus-visible:ring-offset-1 active:scale-[0.99] dark:bg-brand-sky dark:text-brand-deep dark:hover:bg-brand-mist dark:focus-visible:ring-brand-mist dark:focus-visible:ring-offset-brand-deep">Login</button>
      </div>
    </div>
  </header>

  <main class="mx-auto w-full max-w-7xl p-4 sm:p-6 md:p-8 lg:px-8">
    <section class="mb-6 rounded-3xl border border-brand-sky/40 bg-brand-paper/95 p-5 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:p-7 dark:border-brand-sky/40 dark:bg-brand-deep/80">
      <h1 id="studentTitle" class="mb-2 text-2xl font-semibold tracking-tight sm:text-3xl md:text-4xl">Student Showcase</h1>
      <p id="studentSubtitle" class="max-w-2xl text-sm leading-relaxed text-brand-deep/85 dark:text-brand-mist/85"></p>
    </section>

    <section id="uploadSection" class="hidden mb-6 rounded-2xl border border-brand-sky/40 bg-brand-paper p-4 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:mb-8 sm:p-6 dark:border-brand-sky/40 dark:bg-brand-deep/80">
      <h2 class="mb-3 text-lg font-semibold tracking-tight">Upload media</h2>
      <div id="dropzone" role="region" aria-label="File upload dropzone" class="mb-3 rounded-2xl border-2 border-dashed border-brand-sky/70 bg-brand-mist p-5 text-center sm:p-6 dark:border-brand-sky dark:bg-brand-deep/70">
        <p class="mb-3 text-sm leading-relaxed text-brand-deep/85 dark:text-brand-mist/90">Drop PNG/JPG/PDF here</p>
        <button id="chooseFileBtn" type="button" class="rounded-xl bg-brand-deep px-4 py-2 text-sm font-medium text-brand-paper transition-all duration-200 ease-out hover:bg-brand-sky hover:text-brand-deep hover:shadow focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-sky focus-visible:ring-offset-1 active:scale-[0.99] dark:bg-brand-sky dark:text-brand-deep dark:hover:bg-brand-mist dark:focus-visible:ring-brand-mist dark:focus-visible:ring-offset-brand-deep">Choose file</button>
        <input id="fileInput" type="file" accept=".png,.jpg,.jpeg,.pdf" class="hidden" />
        <p id="fileName" class="mt-3 text-xs text-brand-deep/75 dark:text-brand-mist/80"></p>
      </div>
      <button id="uploadBtn" type="button" class="rounded-xl bg-brand-deep px-4 py-2 text-sm font-medium text-brand-paper transition-all duration-200 ease-out hover:bg-brand-sky hover:text-brand-deep hover:shadow focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-sky focus-visible:ring-offset-1 active:scale-[0.99] dark:bg-brand-sky dark:text-brand-deep dark:hover:bg-brand-mist dark:focus-visible:ring-brand-mist dark:focus-visible:ring-offset-brand-deep">Upload</button>
    </section>

    <section class="rounded-2xl border border-brand-sky/40 bg-brand-paper p-4 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:p-5 dark:border-brand-sky/40 dark:bg-brand-deep/80">
      <h2 class="mb-3 text-lg font-semibold tracking-tight">Uploaded Media</h2>
      <p class="mb-4 text-sm leading-relaxed text-brand-deep/75 dark:text-brand-mist/80">Select a poster to open a full-screen view. Use Escape to close.</p>
      <div id="studentGallery" aria-live="polite" class="grid grid-cols-1 gap-6"></div>
    </section>
  </main>

  <script src="config.local.js"></script>
  <script type="module" src="students.js"></script>
  <script type="module" src="student.js"></script>
</body>
</html>
