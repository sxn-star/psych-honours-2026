<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Gallery</title>
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="stylesheet" href="styles/output.css" />
</head>
<body class="min-h-screen bg-gradient-to-b from-gray-50 to-gray-100 text-gray-900 transition-colors duration-200 dark:from-gray-950 dark:to-gray-900 dark:text-gray-100">
  <header class="border-b border-gray-200/70 bg-white/80 backdrop-blur dark:border-gray-800 dark:bg-gray-950/80">
    <div class="mx-auto flex max-w-5xl flex-col gap-3 p-4 sm:flex-row sm:items-center sm:justify-between">
      <a href="index.html" aria-label="Back to home" class="text-sm text-gray-600 transition-colors duration-200 hover:text-black focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-700 focus-visible:ring-offset-1 dark:text-gray-400 dark:hover:text-white dark:focus-visible:ring-gray-300 dark:focus-visible:ring-offset-gray-900">← Home</a>
      <div class="flex w-full items-center justify-end gap-2 sm:w-auto">
        <button id="themeToggle" type="button" aria-label="Toggle dark mode" aria-pressed="false" class="rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 transition-all duration-200 ease-out hover:bg-gray-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-700 focus-visible:ring-offset-1 active:scale-[0.99] dark:border-gray-700 dark:bg-gray-900 dark:text-gray-200 dark:hover:bg-gray-800 dark:focus-visible:ring-gray-300 dark:focus-visible:ring-offset-gray-900">Dark</button>
        <button id="loginBtn" type="button" aria-label="Log in with Google" class="rounded-xl bg-gray-900 px-4 py-2 text-sm font-medium text-white shadow-sm transition-all duration-200 ease-out hover:bg-black hover:shadow focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-700 focus-visible:ring-offset-1 active:scale-[0.99] dark:bg-white dark:text-gray-900 dark:hover:bg-gray-200 dark:focus-visible:ring-gray-300 dark:focus-visible:ring-offset-gray-900">Login</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl p-4 sm:p-6 md:p-8">
    <section class="mb-6 rounded-3xl border border-gray-200 bg-white/90 p-5 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:p-7 dark:border-gray-800 dark:bg-gray-900/80">
      <h1 id="studentTitle" class="mb-2 text-2xl font-semibold tracking-tight sm:text-3xl md:text-4xl">Student Gallery</h1>
      <p id="studentSubtitle" class="max-w-2xl text-sm leading-relaxed text-gray-600 dark:text-gray-400"></p>
    </section>

    <section id="uploadSection" class="hidden mb-6 rounded-2xl border border-gray-200 bg-white p-4 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:mb-8 sm:p-6 dark:border-gray-800 dark:bg-gray-900">
      <h2 class="mb-3 text-lg font-semibold tracking-tight">Upload media</h2>
      <div id="dropzone" role="region" aria-label="File upload dropzone" class="mb-3 rounded-2xl border-2 border-dashed border-gray-300 bg-gray-50 p-5 text-center sm:p-6 dark:border-gray-700 dark:bg-gray-950/60">
        <p class="mb-3 text-sm leading-relaxed text-gray-600 dark:text-gray-400">Drop PNG/JPG/PDF here</p>
        <button id="chooseFileBtn" type="button" class="rounded-xl bg-gray-900 px-4 py-2 text-sm font-medium text-white transition-all duration-200 ease-out hover:bg-black hover:shadow focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-700 focus-visible:ring-offset-1 active:scale-[0.99] dark:bg-white dark:text-gray-900 dark:hover:bg-gray-200 dark:focus-visible:ring-gray-300 dark:focus-visible:ring-offset-gray-900">Choose file</button>
        <input id="fileInput" type="file" accept=".png,.jpg,.jpeg,.pdf" class="hidden" />
        <p id="fileName" class="mt-3 text-xs text-gray-500 dark:text-gray-400"></p>
      </div>
      <button id="uploadBtn" type="button" class="rounded-xl bg-gray-900 px-4 py-2 text-sm font-medium text-white transition-all duration-200 ease-out hover:bg-black hover:shadow focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-700 focus-visible:ring-offset-1 active:scale-[0.99] dark:bg-white dark:text-gray-900 dark:hover:bg-gray-200 dark:focus-visible:ring-gray-300 dark:focus-visible:ring-offset-gray-900">Upload</button>
    </section>

    <section class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm transition-shadow duration-200 ease-out hover:shadow sm:p-5 dark:border-gray-800 dark:bg-gray-900">
      <h2 class="mb-3 text-lg font-semibold tracking-tight">Approved media</h2>
      <div id="studentGallery" aria-live="polite" class="grid grid-cols-1 gap-3 sm:grid-cols-2 sm:gap-4 md:grid-cols-3"></div>
    </section>
  </main>

  <script src="config.local.js"></script>
  <script type="module" src="students.js"></script>
  <script type="module" src="student.js"></script>
</body>
</html>
